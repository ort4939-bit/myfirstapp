<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lecture PDF</title>
  <style>
    :root { color-scheme: light; font-family: Arial, "Noto Sans KR", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; color: #111827; }
    header { height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 20px; background: #ffffff; border-bottom: 1px solid #d7dce3; }
    h1 { margin: 0; font-size: 17px; font-weight: 700; }
    a { color: #0f5fcb; text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    main { height: calc(100vh - 56px); }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: #ffffff; }
    @media (max-width: 640px) {
      header { height: auto; min-height: 64px; align-items: flex-start; flex-direction: column; padding: 12px 14px; }
      main { height: calc(100vh - 88px); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Lecture PDF</h1>
    <a href="lecture.pdf" download>Download PDF</a>
  </header>
  <main>
    <iframe src="lecture.pdf" title="Lecture PDF"></iframe>
  </main>
</body>
</html>
